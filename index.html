<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Restaurant Menu</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9966,#ff5e62,#6a11cb,#2575fc);
background-size:400% 400%;
animation:bg 10s ease infinite;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
text-align:center;
color:white;
font-size:38px;
font-weight:bold;
margin-bottom:25px;
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.15);
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.card{
background:white;
max-width:700px;
margin:25px auto;
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.food-title{
font-size:32px;
text-align:center;
margin-bottom:15px;
font-weight:bold;
}

.table{
background:linear-gradient(#8b5a2b,#5a3818);
height:420px;
border-radius:20px;
padding:15px;
box-shadow:inset 0 0 20px rgba(0,0,0,.4);
}

model-viewer{
width:100%;
height:100%;
background:transparent;
}

.price{
text-align:center;
font-size:32px;
font-weight:bold;
color:green;
margin-top:15px;
}

.order{
display:block;
width:220px;
margin:15px auto;
padding:12px;
border:none;
border-radius:30px;
font-size:20px;
font-weight:bold;
background:linear-gradient(90deg,#ff512f,#dd2476);
color:white;
}

.footer{
text-align:center;
color:white;
font-size:18px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="header">
🍽️ Premium 3D Restaurant Menu
</div>

<div class="card">
<div class="food-title">🍕 Pizza</div>
<div class="table">
<model-viewer
src="pizza.glb"
camera-controls
auto-rotate
shadow-intensity="2">
</model-viewer>
</div>
<div class="price">₹199</div>
<button class="order">Order Now</button>
</div>

<div class="card">
<div class="food-title">🍔 Hamburger</div>
<div class="table">
<model-viewer
src="burger_meal.glb"
camera-controls
auto-rotate
shadow-intensity="2">
</model-viewer>
</div>
<div class="price">₹249</div>
<button class="order">Order Now</button>
</div>

<div class="card">
<div class="food-title">🥟 Momos</div>
<div class="table">
<model-viewer
src="momo_food.glb"
camera-controls
auto-rotate
shadow-intensity="2">
</model-viewer>
</div>
<div class="price">₹149</div>
<button class="order">Order Now</button>
</div>

<div class="card">
<div class="food-title">🍟 French Fries</div>
<div class="table">
<model-viewer
src="fries_-_midpoly.glb"
camera-controls
auto-rotate
shadow-intensity="2">
</model-viewer>
</div>
<div class="price">₹99</div>
<button class="order">Order Now</button>
</div>

<div class="card">
<div class="food-title">🍛 Biryani</div>
<div class="table">
<model-viewer
src="biryani.glb"
camera-controls
auto-rotate
shadow-intensity="2">
</model-viewer>
</div>
<div class="price">₹198</div>
<button class="order">Order Now</button>
</div>

<div class="footer">
⭐ 3D Interactive Restaurant Menu ⭐
</div>

</body>
</html>
